name: 'prpack'
description: 'Pack a pull request into one markdown file optimized for LLM code review.'
author: 'Scott Thurman'
branding:
  icon: 'package'
  color: 'purple'

inputs:
  base:
    description: 'Base ref to diff against. Defaults to the PR base ref, or origin/main outside of PR events.'
    required: false
  head:
    description: 'Head ref. Defaults to the PR head SHA (if in a pull_request event) or github.sha otherwise.'
    required: false
  config:
    description: 'Path to a .prpack.yml config file in your repo.'
    required: false
  include-tests:
    description: 'Include adjacent test files.'
    required: false
    default: 'false'
  exclude:
    description: 'Newline-separated list of glob patterns to exclude.'
    required: false
  max-bytes:
    description: 'Skip files larger than this many bytes.'
    required: false
    default: '200000'
  no-content:
    description: 'Output diff only, no full file content.'
    required: false
    default: 'false'
  output-path:
    description: 'Where to write the packed markdown.'
    required: false
    default: 'prpack-context.md'
  upload-artifact:
    description: 'Upload the packed file as a workflow artifact.'
    required: false
    default: 'true'
  post-summary-comment:
    description: 'Post a brief summary comment on the PR. Requires pull_request event and pull-requests:write permission.'
    required: false
    default: 'true'

outputs:
  output-path:
    description: 'Path to the packed markdown file.'
    value: ${{ steps.pack.outputs.output-path }}
  size-bytes:
    description: 'Size of the packed markdown in bytes.'
    value: ${{ steps.pack.outputs.size-bytes }}
  files-changed:
    description: 'Number of files included in the pack.'
    value: ${{ steps.pack.outputs.files-changed }}

runs:
  using: 'composite'
  steps:
    - name: Resolve base and head refs
      id: refs
      shell: bash
      run: |
        # Base
        if [ -n "${{ inputs.base }}" ]; then
          BASE="${{ inputs.base }}"
        elif [ -n "${{ github.event.pull_request.base.sha }}" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
        else
          BASE="origin/main"
        fi
        # Head
        if [ -n "${{ inputs.head }}" ]; then
          HEAD="${{ inputs.head }}"
        elif [ -n "${{ github.event.pull_request.head.sha }}" ]; then
          HEAD="${{ github.event.pull_request.head.sha }}"
        else
          HEAD="${{ github.sha }}"
        fi
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        echo "head=$HEAD" >> "$GITHUB_OUTPUT"
        echo "base=$BASE  head=$HEAD"

    - name: Pack the PR
      id: pack
      shell: bash
      env:
        BASE: ${{ steps.refs.outputs.base }}
        HEAD: ${{ steps.refs.outputs.head }}
        OUT: ${{ inputs.output-path }}
        CONFIG: ${{ inputs.config }}
        INCLUDE_TESTS: ${{ inputs.include-tests }}
        NO_CONTENT: ${{ inputs.no-content }}
        MAX_BYTES: ${{ inputs.max-bytes }}
        EXCLUDE: ${{ inputs.exclude }}
      run: |
        set -e
        ARGS=( --base "$BASE" --head "$HEAD" --out "$OUT" --max-bytes "$MAX_BYTES" )
        if [ -n "$CONFIG" ]; then ARGS+=( --config "$CONFIG" ); fi
        if [ "$INCLUDE_TESTS" = "true" ]; then ARGS+=( --include-tests ); fi
        if [ "$NO_CONTENT" = "true" ]; then ARGS+=( --no-content ); fi
        if [ -n "$EXCLUDE" ]; then
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            ARGS+=( --exclude "$pattern" )
          done <<< "$EXCLUDE"
        fi
        echo "Running: npx -y github:Lucas2944/prpack ${ARGS[*]}"
        npx -y github:Lucas2944/prpack "${ARGS[@]}"

        SIZE=$(wc -c < "$OUT" | tr -d ' ')
        FILES=$(grep -cE '^## `' "$OUT" || true)
        echo "output-path=$OUT" >> "$GITHUB_OUTPUT"
        echo "size-bytes=$SIZE" >> "$GITHUB_OUTPUT"
        echo "files-changed=$FILES" >> "$GITHUB_OUTPUT"

    - name: Upload packed context as artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: prpack-context
        path: ${{ steps.pack.outputs.output-path }}
        if-no-files-found: error
        retention-days: 14

    - name: Post summary comment on PR
      if: ${{ inputs.post-summary-comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SIZE: ${{ steps.pack.outputs.size-bytes }}
        FILES: ${{ steps.pack.outputs.files-changed }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        TOKENS=$(( SIZE / 4 ))
        SIZE_KB=$(awk "BEGIN { printf \"%.1f\", $SIZE / 1024 }")
        BODY=$(cat <<EOF
        ### prpack — PR packed for LLM review

        **Files changed:** $FILES
        **Pack size:** ${SIZE_KB} KB (~${TOKENS} tokens)

        Download the \`prpack-context\` artifact from this run, paste it into Claude / Cursor / your model, and ask for a review. The packed markdown contains the full diff plus the post-change content of every touched file.

        <sub>Generated by [prpack-action](https://github.com/Lucas2944/prpack-action) · [tool docs](https://github.com/Lucas2944/prpack)</sub>
        EOF
        )
        gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
